# =============================================================================
# OpenClaw Workday Agent — Docker Compose
# =============================================================================
#
# Usage:
#   docker compose up -d                                       # Start orchestrator
#   docker compose run --rm agent node scripts/approve-workday.js  # Legacy CDP relay
#   docker compose run --rm pipeline-runner --action sso_login     # Run pipeline
#
# Testing:
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm pipeline-runner-test
#   docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm orchestrator-test
# =============================================================================

services:
  # --- Elixir Orchestrator (control plane) ---
  orchestrator:
    build: ./orchestrator
    env_file: .env
    depends_on:
      - pipeline-runner
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CDP_HOST=host.docker.internal
      - PIPELINE_RUNNER_PATH=/app/pipeline_runner
      # IAMQ connectivity
      - IAMQ_HTTP_URL=http://host.docker.internal:18790
      - IAMQ_WS_URL=ws://host.docker.internal:18793/ws
      - IAMQ_AGENT_ID=workday_agent

  # --- Python Pipeline Runner (headless browser automation) ---
  pipeline-runner:
    build: ./tools/pipeline_runner
    env_file: .env
    # Playwright needs shared memory for Chromium
    shm_size: '2gb'
    environment:
      - PLAYWRIGHT_HEADLESS=true

  # --- Legacy Node.js CDP Scripts (relay fallback) ---
  agent:
    build: .
    env_file: .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - CDP_HOST=host.docker.internal
